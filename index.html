<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSchool Trainer Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0b132b; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-card { width: 100%; max-width: 700px; height: 80vh; background: #1c2541; border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #3a506b; overflow: hidden; }
        .chat-header { padding: 18px; background: #0b132b; border-bottom: 1px solid #3a506b; display: flex; align-items: center; gap: 10px; }
        .chat-header h2 { font-size: 18px; color: #48cae4; }
        .status-dot { width: 10px; height: 10px; background-color: #2ec4b6; border-radius: 50%; }
        .chips-container { padding: 12px; display: flex; gap: 8px; overflow-x: auto; background: #1c2541; border-bottom: 1px solid #2b3a55; }
        .chip { background: #2b3a55; color: #caf0f8; border: 1px solid #48cae4; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.2s; whitespace: nowrap; }
        .chip:hover { background: #48cae4; color: #0b132b; font-weight: bold; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user-msg { background: #0077b6; color: #ffffff; align-self: flex-start; }
        .bot-msg { background: #2b3a55; color: #caf0f8; align-self: flex-end; }
        .chat-input-container { padding: 15px; background: #0b132b; display: flex; gap: 10px; border-top: 1px solid #3a506b; }
        .chat-input { flex: 1; background: #1c2541; border: 1px solid #3a506b; border-radius: 8px; padding: 10px 14px; color: #ffffff; font-size: 14px; outline: none; }
        .send-btn { background: #48cae4; color: #0b132b; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">
        <span class="status-dot"></span>
        <h2>iSchool Trainer</h2>
    </div>

    <div class="chips-container">
        <button class="chip" onclick="quickSend('Teaching Skills')">Teaching Skills</button>
        <button class="chip" onclick="quickSend('Presentation Skills')">Presentation Skills</button>
        <button class="chip" onclick="quickSend('Communication Skills')">Communication Skills</button>
        <button class="chip" onclick="quickSend('Management Skills')">Management Skills</button>
    </div>

    <div class="chat-messages" id="chatBox">
        <div class="message bot-msg">أهلاً بك! كيف يمكنني مساعدتك اليوم؟</div>
    </div>

    <div class="chat-input-container">
        <input type="text" id="userInput" class="chat-input" placeholder="اكتب سؤالك / Type your question..." onkeydown="if(event.key==='Enter') handleSend()">
        <button class="send-btn" onclick="handleSend()">إرسال</button>
    </div>
</div>

<script>
    // ====================================================
    // 🟢 الكود الجديد: تقسيم المفتاح
    // ====================================================
    
    // ضعي الجزء الأول من المفتاح هنا
    const PART1 = "gsk_itQ3Du1PHQfVDIIUMLhzWGdyb3"; 
    
    // ضعي الجزء الثاني المتبقي هنا
    const PART2 = "FYCxHwdSxkAGBMsmElmzFLxzVv"; 

    // دمج المفتاحين في متغير واحد
    const GROQ_API_KEY = PART1 + PART2;

    // ====================================================

    function quickSend(topic) {
        document.getElementById("userInput").value = `حدثني عن ${topic}`;
        handleSend();
    }

    async function handleSend() {
        const inputField = document.getElementById("userInput");
        const text = inputField.value.trim();
        if (!text) return;

        const chatBox = document.getElementById("chatBox");

        const userDiv = document.createElement("div");
        userDiv.className = "message user-msg";
        userDiv.textContent = text;
        chatBox.appendChild(userDiv);

        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const botDiv = document.createElement("div");
        botDiv.className = "message bot-msg";
        botDiv.textContent = "... جاري الإجابة";
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: "أنت مساعد ومربٍّ محترف لتدريب المهارات لمؤسسة iSchool. أجب دائماً باللغة العربية بأسلوب منظم وواضح." },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                botDiv.textContent = data.choices[0].message.content;
            } else {
                botDiv.textContent = "يرجى التأكد من وضع المفتاح بالشكل الصحيح.";
            }
        } catch (error) {
            botDiv.textContent = "حدث خطأ أثناء الاتصال بالخادم.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
